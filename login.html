<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh fhamet | Connexion</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6">
    <div class="oh-fhamet-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                <div class="w-10 h-10 bg-secondary rounded-lg flex items-center justify-center text-white font-bold text-xl">💡</div>
                <span class="text-2xl font-bold tracking-tight text-text-dark">Oh fhamet</span>
            </a>
            <h2 class="text-2xl font-bold text-text-dark">Bon retour !</h2>
            <p class="text-gray-500">Connectez-vous pour continuer à apprendre.</p>
        </div>
        <form class="flex flex-col gap-4" onsubmit="event.preventDefault(); window.location.href='student-dashboard.html';">
            <div class="flex flex-col gap-1">
                <label class="text-sm font-bold text-gray-700">Email</label>
                <input type="email" placeholder="votre@email.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" required>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-bold text-gray-700">Mot de passe</label>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" required>
            </div>
            <button type="submit" class="btn-primary w-full mt-2">Se connecter</button>
        </form>
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-500">Pas encore de compte ? <a href="register.html" class="text-primary font-bold hover:underline">S'inscrire</a></p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
