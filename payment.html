<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh fhamet | Paiement</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background pt-32 pb-20 px-6">
    <div class="max-w-4xl mx-auto grid md:grid-cols-2 gap-12">
        <div class="flex flex-col gap-8">
            <h1 class="text-3xl font-bold text-text-dark">Finalisez votre inscription</h1>
            <div class="oh-fhamet-card flex items-center gap-4 p-4">
                <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&w=200&q=80" alt="course" class="w-20 h-20 rounded-xl object-cover">
                <div>
                    <h3 class="font-bold text-text-dark">Algèbre Linéaire : Les Bases</h3>
                    <p class="text-primary font-bold">199 DH</p>
                </div>
            </div>
            <div class="flex flex-col gap-4">
                <h3 class="font-bold text-text-dark">Ce que vous obtenez :</h3>
                <div class="flex items-center gap-3 text-gray-600"><i data-lucide="check-circle-2" class="w-5 h-5 text-accent"></i><span>Accès illimité à vie</span></div>
                <div class="flex items-center gap-3 text-gray-600"><i data-lucide="check-circle-2" class="w-5 h-5 text-accent"></i><span>12 leçons vidéo HD</span></div>
                <div class="flex items-center gap-3 text-gray-600"><i data-lucide="check-circle-2" class="w-5 h-5 text-accent"></i><span>Exercices interactifs</span></div>
            </div>
        </div>

        <div class="oh-fhamet-card flex flex-col gap-6">
            <h3 class="text-xl font-bold text-text-dark">Détails du paiement</h3>
            <div class="flex flex-col gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-bold text-gray-700">Nom sur la carte</label>
                    <input type="text" placeholder="Ahmed Bennani" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-bold text-gray-700">Numéro de carte</label>
                    <input type="text" placeholder="**** **** **** ****" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary">
                </div>
            </div>
            <div class="pt-4 border-t border-gray-100">
                <div class="flex justify-between mb-4">
                    <span class="text-gray-500">Total à payer</span>
                    <span class="text-2xl font-bold text-text-dark">199 DH</span>
                </div>
                <button onclick="alert('Oh fhamet ! 🎉 Paiement réussi.'); window.location.href='student-dashboard.html';" class="btn-primary w-full">Payer maintenant</button>
            </div>
            <p class="text-xs text-center text-gray-400">Paiement sécurisé par cryptage SSL.</p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
