<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Cours | Oh fhamet</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-100 p-6 flex flex-col gap-8 sticky top-0 h-screen">
        <a href="index.html" class="px-2 group">
            <img src="/logo.png" alt="Oh fhamet Logo" class="logo-img h-16" referrerPolicy="no-referrer">
        </a>
        <nav class="flex flex-col gap-2 flex-1">
            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-4">Menu</div>
            <a href="student-dashboard.html" class="sidebar-link"><i data-lucide="layout-dashboard" class="w-5 h-5"></i>Tableau de bord</a>
            <a href="student-courses.html" class="sidebar-link active"><i data-lucide="book-open" class="w-5 h-5"></i>Mes Cours</a>
            <a href="student-exercises.html" class="sidebar-link"><i data-lucide="check-square" class="w-5 h-5"></i>Exercices</a>
            <a href="student-homework-upload.html" class="sidebar-link"><i data-lucide="upload" class="w-5 h-5"></i>Devoirs</a>
            <a href="student-progress.html" class="sidebar-link"><i data-lucide="bar-chart-3" class="w-5 h-5"></i>Ma Progression</a>
        </nav>
        <div class="pt-6 border-t border-gray-100">
            <a href="login.html" class="sidebar-link"><i data-lucide="log-out" class="w-5 h-5"></i>Déconnexion</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-text-dark">Mes Cours</h1>
                <p class="text-gray-500">Continuez là où vous vous êtes arrêté.</p>
            </div>
        </header>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="oh-fhamet-card group flex flex-col h-full relative overflow-hidden">
                <div class="relative h-48 -mx-6 -mt-6 mb-4 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&w=800&q=80" alt="Maths" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute top-4 left-4"><span class="badge-maths">maths</span></div>
                </div>
                <div class="flex-1 flex flex-col gap-2">
                    <h3 class="text-lg font-bold text-text-dark leading-tight group-hover:text-primary">Algèbre Linéaire : Les Bases</h3>
                    <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden mt-4">
                        <div class="h-full bg-primary w-[65%]"></div>
                    </div>
                    <span class="text-xs font-bold text-primary">65% complété</span>
                </div>
                <div class="mt-6 pt-4 border-t border-gray-100">
                    <a href="#" class="btn-primary w-full">Continuer</a>
                </div>
            </div>

            <div class="oh-fhamet-card group flex flex-col h-full relative overflow-hidden">
                <div class="relative h-48 -mx-6 -mt-6 mb-4 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=800&q=80" alt="French" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute top-4 left-4"><span class="badge-french">french</span></div>
                </div>
                <div class="flex-1 flex flex-col gap-2">
                    <h3 class="text-lg font-bold text-text-dark leading-tight group-hover:text-primary">Grammaire : Maîtriser la Syntaxe</h3>
                    <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden mt-4">
                        <div class="h-full bg-accent w-[100%]"></div>
                    </div>
                    <span class="text-xs font-bold text-accent">Oh fhamet ! ✅</span>
                </div>
                <div class="mt-6 pt-4 border-t border-gray-100">
                    <a href="#" class="btn-secondary w-full">Revoir</a>
                </div>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
