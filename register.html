<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh fhamet | Inscription</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6">
    <div class="oh-fhamet-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block mb-6 group">
                <img src="/logo.png" alt="Oh fhamet Logo" class="logo-img mx-auto" referrerPolicy="no-referrer">
            </a>
            <h2 class="text-2xl font-bold text-text-dark">Créer un compte</h2>
            <p class="text-gray-500">Rejoignez la communauté Oh fhamet.</p>
        </div>
        <form class="flex flex-col gap-4" onsubmit="event.preventDefault(); window.location.href='student-dashboard.html';">
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-bold text-gray-700">Prénom</label>
                    <input type="text" placeholder="Ahmed" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-bold text-gray-700">Nom</label>
                    <input type="text" placeholder="Bennani" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary" required>
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-bold text-gray-700">Email</label>
                <input type="email" placeholder="votre@email.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary" required>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-bold text-gray-700">Rôle</label>
                <select class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary bg-white">
                    <option value="student">Étudiant</option>
                    <option value="teacher">Professeur</option>
                </select>
            </div>
            <button type="submit" class="btn-primary w-full mt-2">S'inscrire</button>
        </form>
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-500">Déjà un compte ? <a href="login.html" class="text-primary font-bold hover:underline">Se connecter</a></p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
